<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Grit{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/variables.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/reset.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/buttons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/flash.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/forms.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/exercise.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/history.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/recent-workouts.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/sidebar.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/responsive.css') }}"
    />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      {% if current_user.is_authenticated %}
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h2>Grit</h2>
          <p class="brand-sub">Fitness Tracker</p>
        </div>

        <nav class="sidebar-nav">
          <a
            href="{{ url_for('main.dashboard') }}"
            class="nav-item {% if request.endpoint == 'main.dashboard' %}active{% endif %}"
          >
            <span class="nav-icon">📊</span>
            Dashboard
          </a>
          <a
            href="{{ url_for('main.log_workout') }}"
            class="nav-item {% if request.endpoint == 'main.log_workout' %}active{% endif %}"
          >
            <span class="nav-icon">🏋️</span>
            Log Workout
          </a>
          <a
            href="{{ url_for('main.plans') }}"
            class="nav-item {% if request.endpoint == 'main.plans' or request.endpoint == 'main.create_plan' %}active{% endif %}"
          >
            <span class="nav-icon">📋</span>
            Workout Plans
          </a>
          <a
            href="{{ url_for('main.log_weight') }}"
            class="nav-item {% if request.endpoint == 'main.log_weight' %}active{% endif %}"
          >
            <span class="nav-icon">⚖️</span>
            Log Weight
          </a>
          <a
            href="{{ url_for('main.workout_history') }}"
            class="nav-item {% if request.endpoint == 'main.workout_history' %}active{% endif %}"
          >
            <span class="nav-icon">📋</span>
            Workout History
          </a>
          <a
            href="{{ url_for('main.weight_history') }}"
            class="nav-item {% if request.endpoint == 'main.weight_history' %}active{% endif %}"
          >
            <span class="nav-icon">📈</span>
            Weight History
          </a>
          <a
            href="{{ url_for('main.goals') }}"
            class="nav-item {% if request.endpoint == 'main.goals' %}active{% endif %}"
          >
            <span class="nav-icon">🎯</span>
            Goals
          </a>
          <a
            href="{{ url_for('main.photos') }}"
            class="nav-item {% if request.endpoint == 'main.photos' %}active{% endif %}"
          >
            <span class="nav-icon">📸</span>
            Photos
          </a>
        </nav>

        <div class="sidebar-footer">
          <a href="{{ url_for('main.logout') }}" class="nav-item logout">
            <span class="nav-icon">🚪</span>
            Logout
          </a>
        </div>
      </aside>
      {% endif %}

      <!-- Main Content -->
      <main
        class="main-content {% if not current_user.is_authenticated %}full-width{% endif %}"
      >
        {% block content %}{% endblock %}
      </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
